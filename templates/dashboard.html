<!DOCTYPE html>
<html>

<head>

<title>Campus Security Control Room</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
}

h1{
color:#00ffcc;
}

.container{
display:flex;
}

.map{
width:60%;
}

.events{
width:40%;
padding-left:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #444;
}

.high{color:red;}
.medium{color:orange;}
.low{color:lightgreen;}

</style>

</head>

<body>

<h1>Smart Campus Surveillance Dashboard</h1>

<div class="container">

<div class="map">

<img src="/static/campus_map.jpg" width="100%">

</div>

<div class="events">

<h2>Recent Intrusion Events</h2>

<table>

<tr>
<th>Time</th>
<th>Zone</th>
<th>Threat</th>
<th>Level</th>
<th>Image</th>
</tr>

{% for e in events %}

<tr>

<td>{{e[0]}}</td>
<td>{{e[1]}}</td>
<td>{{e[2]}}</td>

<td class="{{e[3]|lower}}">
{{e[3]}}
</td>

<td>
{% if e[4] %}
{{e[4]}}
{% else %}
-
{% endif %}
</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
